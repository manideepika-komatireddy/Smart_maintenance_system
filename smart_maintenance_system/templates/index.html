<!DOCTYPE html>
<html>
<head>
    <title>Smart Predictive Failure Alert System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#d4fcf0,#a8edea, #e2e9fb);
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            text-align: center;
            margin-top: 60px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            width: 250px;
            border-radius: 20px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.2);
        }

        .card a {
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background: rgba(255,255,255,0.1);
        }

        th, td {
            padding: 10px;
            border: 1px solid white;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>

</head>

<body>

<div class="navbar">
    ⚙ Smart Predictive Failure Alert System 🚀
</div>

<div class="container">
    <h1>Main Dashboard</h1>

    <div class="card-container">

        <div class="card">
            <div class="icon">➕</div>
            <a href="/add_machine">Add Machine</a>
        </div>

        <div class="card">
            <div class="icon">📋</div>
            <a href="/view_machines">View Machines</a>
        </div>

        <div class="card">
            <div class="icon">📊</div>
            <a href="/dashboard">Dashboard</a>
        </div>

    </div>
</div>

<footer>
    Made for Predictive Maintenance System
</footer>

</body>
</html>
