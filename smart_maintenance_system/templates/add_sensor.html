<!DOCTYPE html>
<html>
<head>
    <title>Add Sensor Data</title>
</head>

<body style="margin:0; padding:0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:white; padding:40px; width:400px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">

        <h2 style="text-align:center; margin-bottom:30px; color:#333;">
            Add Sensor Data
        </h2>

        <form method="POST" style="display:flex; flex-direction:column;">

            <label style="font-weight:bold; margin-bottom:5px;">Temperature:</label>
            <input type="number" step="0.1" name="temperature" required
                   style="padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px; font-size:14px;">

            <label style="font-weight:bold; margin-bottom:5px;">Vibration:</label>
            <input type="number" step="0.1" name="vibration" required
                   style="padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px; font-size:14px;">

            <label style="font-weight:bold; margin-bottom:5px;">Pressure:</label>
            <input type="number" step="0.1" name="pressure" required
                   style="padding:10px; margin-bottom:25px; border:1px solid #ccc; border-radius:6px; font-size:14px;">

            <button type="submit"
                style="padding:12px; background-color:#667eea; color:white; border:none; border-radius:6px; font-size:15px; cursor:pointer; transition:0.3s;"
                onmouseover="this.style.backgroundColor='#5a67d8'"
                onmouseout="this.style.backgroundColor='#667eea'">
                Submit
            </button>

        </form>

        <a href="/" style="display:block; text-align:center; margin-top:20px; text-decoration:none; color:#667eea; font-weight:bold;"
           onmouseover="this.style.color='#5a67d8'"
           onmouseout="this.style.color='#667eea'">
            Back to Home
        </a>

    </div>

</body>
</html>
