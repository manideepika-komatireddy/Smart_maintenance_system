<!DOCTYPE html>
<html>
<head>
    <title>Sensor Logs</title>
</head>

<body style="margin:0; padding:30px; font-family: Arial, sans-serif; background: linear-gradient(135deg,#1e3c72,#2a5298); min-height:100vh;">

    <div style="max-width:1000px; margin:0 auto; background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">

        <h2 style="text-align:center; margin-bottom:30px; color:#1e3c72;">
            Sensor Logs
        </h2>

        <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:14px;">

                <tr style="background-color:#1e3c72; color:white;">
                    <th style="padding:12px; text-align:center;">ID</th>
                    <th style="padding:12px; text-align:center;">Temperature</th>
                    <th style="padding:12px; text-align:center;">Vibration</th>
                    <th style="padding:12px; text-align:center;">Pressure</th>
                    <th style="padding:12px; text-align:center;">Risk Level</th>
                </tr>

                {% for log in logs %}
                <tr style="text-align:center; border-bottom:1px solid #ddd;"
                    onmouseover="this.style.backgroundColor='#f2f6ff'"
                    onmouseout="this.style.backgroundColor='white'">

                    <td style="padding:10px;">{{ log.log_id }}</td>
                    <td style="padding:10px;">{{ log.temperature }}</td>
                    <td style="padding:10px;">{{ log.vibration }}</td>
                    <td style="padding:10px;">{{ log.pressure }}</td>
                    <td style="padding:10px; font-weight:bold; color:
                        {% if log.risk_level == 'High' %} red
                        {% elif log.risk_level == 'Medium' %} orange
                        {% else %} green
                        {% endif %};">
                        {{ log.risk_level }}
                    </td>

                </tr>
                {% endfor %}

            </table>
        </div>

        <div style="text-align:center; margin-top:25px;">
            <a href="/" style="text-decoration:none;">
                <button style="padding:10px 20px; background-color:#1e3c72; color:white; border:none; border-radius:6px; cursor:pointer; transition:0.3s;"
                        onmouseover="this.style.backgroundColor='#16325c'"
                        onmouseout="this.style.backgroundColor='#1e3c72'">
                    Back to Home
                </button>
            </a>
        </div>

    </div>

</body>
</html>
